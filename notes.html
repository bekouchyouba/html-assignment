    <dl>
      <dt>&lt;h1&gt;</dt>
      <dd>Defines the most important heading on a page.</dd>
      <dt>&lt;p&gt;</dt>
      <dd>Defines a paragraph of text.</dd>
      <dt>&lt;a&gt;</dt>
      <dd>Creates a hyperlink to another page or website.</dd>
      <dt>&lt;img&gt;</dt>
      <dd>Displays an image on the page.</dd>
      <dt>&lt;ul&gt;</dt>
      <dd>Creates an unordered list.</dd>
